<div class="dashboard-container">

  <h2>Find Your Stay</h2>

  <div class="search-box">

    <input 
      type="text" 
      placeholder="Enter location"
      [formControl]="location"
    >

    <input 
      type="date" 
      [formControl]="fromDate"
    >

    <input 
      type="date" 
      [formControl]="toDate"
    >

    <button 
      (click)="search()"
      [disabled]="location.invalid || fromDate.invalid || toDate.invalid">
      Search
    </button>

  </div>

</div>
