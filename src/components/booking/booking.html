<div class="min-vh-100 py-5"
     style="background: linear-gradient(135deg, #e0f7fa, #e3f2fd);">

  <div class="container d-flex justify-content-center">

    <div class="card shadow border-0 rounded-4 p-4" style="max-width: 400px; width: 100%;">

      <h4 class="text-center mb-4 fw-semibold">🧾 Booking</h4>

      <!-- Room Info -->
      <p class="text-muted mb-2">
        <strong>Room:</strong> {{ state.selectedRoom()?.roomType }}
      </p>

      <p class="text-muted mb-2">
        <strong>Price per day:</strong> ₹{{ state.selectedRoom()?.price }}
      </p>

      <!-- Total Bill -->
      <p class="fw-bold text-success mb-3">
        Total Bill: ₹{{ getTotalPrice() }}
      </p>

      <!-- Name -->
      <div class="mb-3">
        <label class="form-label">Your Name</label>
        <input type="text"
               class="form-control"
               [(ngModel)]="name"
               placeholder="Enter your name">
      </div>

      <!-- Button -->
      <div class="d-grid">
        <button class="btn btn-success"
                (click)="book()">
          Confirm Booking
        </button>
      </div>

    </div>

  </div>

</div>
