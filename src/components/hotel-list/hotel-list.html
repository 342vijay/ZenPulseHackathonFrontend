<div class="min-vh-100 py-5"
     style="background: linear-gradient(135deg, #e0f7fa, #e3f2fd);">

  <div class="container">

    <!-- Title -->
    <h4 class="mb-4 text-center fw-semibold">🏨 Available Hotels</h4>

    @if (hotels().length > 0) {

      <div class="row g-4">

        @for (hotel of hotels(); track hotel.hotelId) {

          <div class="col-md-4 col-sm-6">

            <div class="card shadow border-0 rounded-4 h-100">

              <div class="card-body d-flex flex-column">

                <!-- Hotel Name -->
                <h5 class="card-title fw-semibold">
                  {{ hotel.name }}
                </h5>

                <!-- Location -->
                <p class="text-muted mb-4">
                  📍 {{ hotel.location }}
                </p>

                <!-- Button -->
                <div class="mt-auto d-grid">
                  <button class="btn btn-outline-primary"
                          (click)="selectHotel(hotel.hotelId)">
                    View Rooms
                  </button>
                </div>

              </div>

            </div>

          </div>

        }

      </div>

    } @else {

      <div class="text-center mt-5">
        <div class="alert alert-warning">
          No hotels found for selected location
        </div>
      </div>

    }

  </div>

</div>
